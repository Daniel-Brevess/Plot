<ion-content [forceOverscroll]="false">
  <div class="profile-header">
    <div class="top-actions">
      <ion-back-button defaultHref="/" text="" mode="md"></ion-back-button>
      <ion-icon name="ellipsis-vertical" class="menu-icon"></ion-icon>
    </div>

    <div class="user-info">
      <div class="avatar-wrapper">
        <img src="assets/perfil.jpg" alt="Daniel Breves" />
      </div>
      <h1 class="user-name">Daniel Breves</h1>
      <p class="user-handle">@danielbreves</p>
    </div>

    <div class="status-tags">
      <div class="tag"></div>
      <div class="tag"></div>
      <div class="tag"></div>
    </div>
  </div>

  <div class="favorites-section">
    <h3 class="section-title">Favoritos:</h3>

    <div class="book-list">
      <div class="book-item">
        <div class="book-cover-placeholder"></div>
        <div class="book-details">
          <h4>Crime e castigo</h4>
          <p>Autor: Dostoiévski</p>
        </div>
      </div>

      <div class="book-item">
        <div class="book-cover-placeholder"></div>
        <div class="book-details">
          <h4>O Retrato</h4>
          <p>Autor: Dorian Gray</p>
        </div>
      </div>

      <div class="book-item">
        <div class="book-cover-placeholder"></div>
        <div class="book-details">
          <h4>Hábitos Atômicos</h4>
          <p>Autor: James Clear</p>
        </div>
      </div>
    </div>
  </div>
</ion-content>
