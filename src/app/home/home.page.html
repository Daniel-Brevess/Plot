<ion-content [forceOverscroll]="false">
  <div class="welcome-container">
    
    <div class="logo-box">
       <img src="../../assets/Logo_p3.0.png" alt="Logo Plot" class="logo-img">
    </div>

    <h2 class="welcome-title">Bem vindo ao Plot!</h2>

    <div class="button-group">
      <ion-button id="open-register" mode="ios" class="btn-primary">Cadastre-se</ion-button>
      <ion-button id="open-login" mode="ios" class="btn-secondary">Login</ion-button>
    </div>

    <ion-modal trigger="open-register" [initialBreakpoint]="0.5" [breakpoints]="[0, 0.5, 0.8]">
      <ng-template>
        <div class="modal-content">
          <h3>Criar Conta</h3>
          <ion-item lines="none" class="custom-input">
            <ion-input type="text" [(ngModel)]="nome" labelPlacement="floating" placeholder="Nome completo"></ion-input>
          </ion-item>
          <ion-item lines="none" class="custom-input">
            <ion-input type="email" [(ngModel)]="email" labelPlacement="floating" placeholder="E-mail"></ion-input>
          </ion-item>
          <ion-item lines="none" class="custom-input">
            <ion-input type="password" [(ngModel)]="senha" labelPlacement="floating" placeholder="Senha"></ion-input>
          </ion-item>
          <ion-button (click)="cadastrar()" expand="block" class="btn-modal">Cadastrar</ion-button>
        </div>
      </ng-template>
    </ion-modal>

    <ion-modal trigger="open-login" [initialBreakpoint]="0.4" [breakpoints]="[0, 0.4, 0.7]">
      <ng-template>
        <div class="modal-content">
          <h3>Acessar Plot</h3>
          <ion-item lines="none" class="custom-input">
            <ion-input type="email" [(ngModel)]="email" labelPlacement="floating" placeholder="E-mail"></ion-input>
          </ion-item>
          <ion-item lines="none" class="custom-input">
            <ion-input type="password" [(ngModel)]="senha" labelPlacement="floating"placeholder="Senha"></ion-input>
          </ion-item>
          <ion-button (click)="login()" expand="block" class="btn-modal">Entrar</ion-button>
        </div>
      </ng-template>
    </ion-modal>

  </div>
</ion-content>
